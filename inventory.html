<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory — Quality Muffler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0a0a0a; color: white; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; min-height: 100vh; }
    .lavender { color: #c4b5fd; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(196,181,253,0.2); border-radius: 1rem; }
    .btn-lav { background: linear-gradient(135deg, #7c3aed, #a78bfa, #7c3aed); color: white; font-weight: 700; transition: all 0.2s; box-shadow: 0 4px 16px rgba(167,139,250,0.35); border: none; cursor: pointer; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(10,10,10,0.9); border-bottom: 1px solid rgba(196,181,253,0.15); backdrop-filter: blur(12px); }
    .badge { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); color: #c4b5fd; padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .filter-btn { padding: 6px 16px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(196,181,253,0.25); color: rgba(255,255,255,0.5); background: transparent; }
    .filter-btn.active { background: rgba(167,139,250,0.2); border-color: #a78bfa; color: #c4b5fd; }
    .filter-btn:hover:not(.active) { border-color: rgba(196,181,253,0.5); color: white; }
    .item-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .item-row:last-child { border-bottom: none; }
    .stock-low { color: #f87171; }
    .stock-ok { color: #4ade80; }
  </style>
</head>
<body>

  <nav class="px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="text-xl font-black lavender tracking-tight">Quality Muffler</a>
    <a href="index.html" class="text-white/50 hover:text-white text-sm transition-colors">← Back</a>
  </nav>

  <div class="max-w-3xl mx-auto px-4 pt-28 pb-16">
    <p class="lavender text-sm font-semibold tracking-widest uppercase mb-2">Parts & Products</p>
    <h1 class="text-4xl font-black text-white mb-2">Inventory</h1>
    <p class="text-white/40 text-sm mb-8">In-stock parts available for purchase. Call for pricing on unlisted items.</p>

    <!-- Filters -->
    <div id="filters" class="flex flex-wrap gap-2 mb-8"></div>

    <!-- Content -->
    <div id="content">
      <div class="text-center py-16 text-white/30">Loading inventory...</div>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://wztnfxwenipogdpyazrd.supabase.co',
      'sb_publishable_9FvqtLDyx8Am4FK-px4ioA_O_pXiEB6'
    );

    let allItems = [];
    let activeFilter = 'all';

    async function load() {
      const { data, error } = await sb
        .from('inventory')
        .select('*')
        .eq('show_on_site', true)
        .order('category')
        .order('name');

      if (error || !data.length) {
        document.getElementById('content').innerHTML =
          '<div class="card p-10 text-center text-white/30">No inventory items listed yet. Check back soon.</div>';
        return;
      }

      allItems = data;
      buildFilters();
      render();
    }

    function buildFilters() {
      const cats = ['all', ...new Set(allItems.map(i => i.category))];
      const el = document.getElementById('filters');
      el.innerHTML = cats.map(c =>
        `<button class="filter-btn ${c === 'all' ? 'active' : ''}" onclick="setFilter('${c}')">${cap(c)}</button>`
      ).join('');
    }

    function setFilter(cat) {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.toLowerCase() === cap(cat).toLowerCase());
      });
      render();
    }

    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    function render() {
      const items = activeFilter === 'all' ? allItems : allItems.filter(i => i.category === activeFilter);
      const grouped = {};
      items.forEach(i => { (grouped[i.category] = grouped[i.category] || []).push(i); });

      if (!items.length) {
        document.getElementById('content').innerHTML =
          '<div class="card p-10 text-center text-white/30">No items in this category.</div>';
        return;
      }

      document.getElementById('content').innerHTML = Object.entries(grouped).map(([cat, list]) => `
        <div class="card mb-4 overflow-hidden">
          <div class="px-4 py-3 border-b border-white/10 flex items-center gap-3">
            <span class="font-bold text-white">${cap(cat)}</span>
            <span class="badge">${list.length} item${list.length !== 1 ? 's' : ''}</span>
          </div>
          ${list.map(item => `
            <div class="item-row">
              <div>
                <div class="font-semibold text-white text-sm">${item.name}</div>
                ${item.notes ? `<div class="text-white/35 text-xs mt-0.5">${item.notes}</div>` : ''}
              </div>
              <div class="text-right flex flex-col items-end gap-1">
                <div class="font-bold lavender text-sm">${item.price != null ? '$' + Number(item.price).toFixed(2) : 'Call for price'}</div>
                <div class="text-xs ${item.quantity > 5 ? 'stock-ok' : item.quantity > 0 ? 'stock-low' : 'text-white/30'}">
                  ${item.quantity > 0 ? item.quantity + ' in stock' : 'Out of stock'}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    load();
  </script>

  <footer class="text-center py-6">
    <p class="text-white/20 text-xs">© 2026 Quality Muffler</p>
  </footer>
</body>
</html>
